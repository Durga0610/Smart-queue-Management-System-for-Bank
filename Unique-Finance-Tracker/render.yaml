services:
  - type: web
    name: smart-queue-management
    env: node
    plan: free
    rootDir: Unique-Finance-Tracker
    buildCommand: npm install -g pnpm && pnpm install && pnpm run build && pnpm --filter @workspace/db run push
    startCommand: pnpm --filter ./backend run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        value: ./sqlite.db
      - key: SESSION_SECRET
        generateValue: true
